<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 3</title>
    <link rel="stylesheet" href="./styles/global.css" />
    <script src="scripts/index.js" defer></script>
    <script src="scripts/q1.js" defer></script>
    <script src="scripts/q2.js" defer></script>
    <script src="scripts/q3.js" defer></script>
    <script src="scripts/q4.js" defer></script>
    <script src="scripts/q5.js" defer></script>
    <script src="scripts/q6.js" defer></script>
    <script src="scripts/q7.js" defer></script>
    <script src="scripts/q8.js" defer></script>
  </head>
  <body>
    <main>
      <div class="question" id="q1">
        <header>
          <h1>Questão 1</h1>
        </header>
        <form action="" method="post" id="q1Form">
          <div class="input-group">
            <label for="inputQ1">Texto:</label>
            <input type="text" id="inputQ1" name="text" required />
            <div class="result" id="resultQ1"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q2">
        <header>
          <h1>Questão 2</h1>
        </header>
        <form action="" method="post" id="q2Form">
          <div class="input-group">
            <label for="inputQ2">Texto:</label>
            <input type="text" id="inputQ2" name="text" required />
            <div class="result" id="resultQ2"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q3">
        <header>
          <h1>Questão 3</h1>
        </header>
        <form action="" method="post" id="q3Form">
          <div class="input-group">
            <label for="inputQ3">Número inteiro positivo:</label>
            <input type="text" id="inputQ3" name="text" required />
            <div class="result" id="resultQ3"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q4">
        <header>
          <h1>Questão 4</h1>
        </header>
        <form action="" method="post" id="q4Form">
          <div class="input-group">
            <label for="inputQ4">Selecione uma opção:</label>
            <div class="select-container">
              <select id="inputQ4" name="select" required>
                <option value="default" selected disabled>Selecione...</option>
                <option value="opcao1">Opção 1</option>
                <option value="opcao2">Opção 2</option>
              </select>
            </div>
            <div class="result" id="resultQ4"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q5">
        <header>
          <h1>Questão 5</h1>
        </header>
        <form action="" method="post" id="q5Form">
          <div class="input-group">
            <div class="checkbox-container">
              <input type="checkbox" id="inputQ5" name="checkbox" />
              <label for="inputQ5">
                Aceito os termos e condições, quaisquer sejam eles.</label
              >
            </div>
            <div class="result" id="resultQ5"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q6">
        <header>
          <h1>Questão 6</h1>
        </header>
        <form action="" method="post" id="q6Form">
          <div class="input-group">
            <div class="checkbox-container">
              <input
                type="checkbox"
                class="inputQ6"
                id="inputQ61"
                name="checkbox"
              />
              <label for="inputQ61"> Checkbox 1</label>
            </div>
            <div class="checkbox-container">
              <input
                type="checkbox"
                class="inputQ6"
                id="inputQ62"
                name="checkbox"
              />
              <label for="inputQ62"> Checkbox 2</label>
            </div>
            <div class="checkbox-container">
              <input
                type="checkbox"
                class="inputQ6"
                id="inputQ63"
                name="checkbox"
              />
              <label for="inputQ63"> Checkbox 3</label>
            </div>
            <div class="checkbox-container">
              <input
                type="checkbox"
                class="inputQ6"
                id="inputQ64"
                name="checkbox"
              />
              <label for="inputQ64"> Checkbox 4</label>
            </div>
            <div class="result" id="resultQ6"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q7">
        <header>
          <h1>Questão 7</h1>
        </header>
        <form action="" method="post" id="q7Form">
          <div class="input-group">
            <div class="radio-container">
              <input type="radio" class="inputQ7" id="inputQ71" name="radio" />
              <label for="inputQ71"> Radio 1</label>
            </div>
            <div class="radio-container">
              <input type="radio" class="inputQ7" id="inputQ72" name="radio" />
              <label for="inputQ72"> Radio 2</label>
            </div>
            <div class="radio-container">
              <input type="radio" class="inputQ7" id="inputQ73" name="radio" />
              <label for="inputQ73"> Radio 3</label>
            </div>
            <div class="radio-container">
              <input type="radio" class="inputQ7" id="inputQ74" name="radio" />
              <label for="inputQ74"> Radio 4</label>
            </div>
            <div class="result" id="resultQ7"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="question" id="q8">
        <header>
          <h1>Questão 8</h1>
        </header>
        <form action="" method="post" id="q8Form">
          <div class="input-group">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" />
            <div class="result" id="resultName"></div>
          </div>
          <div class="input-group">
            <label for="email">E-mail:</label>
            <input type="text" id="email" name="email" />
            <div class="result" id="resultEmail"></div>
          </div>
          <div class="input-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" />
            <div class="result" id="resultPassword"></div>
          </div>
          <div class="submit">
            <button type="submit">Enviar</button>
          </div>
        </form>
      </div>
      <div class="nav-buttons">
        <button id="previous">Anterior</button>
        <button id="next">Próxima</button>
      </div>
    </main>
  </body>
</html>
